We are 2941H Mecha squad from Otumoetai college in Tauranga, New Zealand. Together our team strives for excellence and are constantly looking for more ways to innovate, learn and improve. Combined our team has 19 years of experience in VEX Robotics and a lot of other experience in the STEM field. This year we have a very well balanced team, Our team leader Tom with 6 years of experience, Indie and William with 3 years of experience, Finn with 2 and Rosa coming onto the team as a rookie. Each skill set compliments and supports the others.
