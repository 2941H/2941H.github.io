[[people]]
name = "Tom"
photo = "./assets/tom.webp"
quote = "There are about 14,300 VEX robotics teams globally and for each and every one of them the dream is to compete at the World Championship one day. I competed for 7 years, played over 300 matches, competed with 17 different teammates, all to chase the dream of qualifying for Worlds. In 2019 I started at the bottom of the ladder and every year, I improved bit by bit. In 2022, the core of 2941H formed as we know it today. Over those four years together, we’ve seen the highs and lows: we’ve won trophies and watched tournaments slip through our hands. We took risks in our designs and strategies when other teams wouldn't. Through innovation and sheer determination, we are now one of the top teams in New Zealand and have been for the last 2 years. Unfortunately I am no longer the 11 year old boy I once was and won't be able to go because of university commitments making 2026 nationals my final destination in my career. I've had the honour to lead this team to the top and to the Worlds qualification, to be able to watch them go and complete the dream I’ve chased for so long means more than anything to me."

[[people]]
name = "Indie"
photo = "./assets/indie.webp"
quote = "Worlds is an opportunity to compete and build connections at one of the highest levels of engineering available for high school students. This has been a goal for 5 years and I have put in tens of thousands of hours. This event is the recognition for that work, along with an opportunity to travel with good friends and teammates to an event we all share a deep interest in.\nI also wish to compete to give to Tom, who chose me to form his team when I was a year 9 and has been a mentor and good friend for 5 years, his goal to have  2941H compete at the highest level."

[[people]]
name = "Finn"
photo = "./assets/finn.webp"
quote = "In engineering there's a term called plastic deformation, where a material is permanently deformed after being stretched past it's limits. Worlds would give me the chance to stretch myself past my limits, and would, regardless of the outcome, leave permanent, positive, changes. There's rarely a case where I can test my abilities to the level that this competition provides. I am very grateful to take part in this exciting opportunity."

[[people]]
name = "Rosa"
photo = "./assets/rosa.webp"
quote = "Despite only doing VEX for one year, it changed my passions and my hopes for the future of not only myself, but the future of the world for all young people. I took a chance, and agreed to be the programmer for 2941H, and I’m forever grateful for that opportunity. To me, Worlds means a chance to prove ourselves and our hard work; the 30 hour weeks we put in, the repetitive filing and sanding, but most importantly, the ideas and innovation that were created. It helped foster a new way of thinking, and a practical aspect to tasks that I hadn’t yet experienced. I met so many like-minded people who helped me grow my skills and shared their love for technology with me. My only regret is not stepping out of my shell and joining robotics earlier. Because of me joining so late, I can’t attend Worlds due to University commitments, but the fact I had the chance to experience it, especially as a woman in STEM, means so much to me, and I will always have a love of robotics thanks to VEX."

[[people]]
name = "William"
photo = "./assets/william.webp"
quote = "I’ve been doing Vex for four years and going to the world championship in the US has been my ultimate and personal goal. Already from my years in Vex I've learned so much in areas such as design, teamwork, and other life skills I will carry with me in my future career. This opportunity is once in a lifetime and it came at the perfect time heading into my final year of vex robotics. The chance to attend worlds is the culmination of everything I’ve worked for, and this is the moment I can finally fulfill my goal of proving my skill to the world."
